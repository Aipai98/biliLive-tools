services:
  # UI镜像（含优先级串行压制开关与房间优先级输入框）
  webui:
    image: ghcr.io/aipai98/bililive-tools-frontend:latest
    ports:
      # 前者按需改动
      - "3000:3000"
  # 接口镜像（带优先级串行压制功能，已由 GitHub Actions 构建到 ghcr.io）
  api:
    image: ghcr.io/aipai98/bililive-tools-backend:latest
    ports:
      - "18010:18010"
    volumes:
      # 映射的配置目录，用于持久化配置文件
      - ./data:/app/data
      # 存储文件的默认目录
      - ./video:/app/video
      # 字体目录
      - ./fonts:/usr/local/share/fonts
    environment:
      # 登录密钥
      - BILILIVE_TOOLS_PASSKEY=your_passkey
      # 账户加密密钥
      - BILILIVE_TOOLS_BILIKEY=your_bilikey
      # 文件管理器可删除的目录
      - BILILIVE_TOOLS_DELETE_DIRS=/app/video
      # 中国时区
      - TZ=Asia/Shanghai
